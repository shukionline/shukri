<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<title>Shukri Online - Iibso Alaabta</title>
<style>
  body { font-family: Arial, sans-serif; direction: rtl; padding: 20px; }
  label { display: block; margin-top: 10px; }
  input, textarea, select, button { width: 300px; padding: 5px; margin-top: 5px; }
  button { background-color: #25D366; color: white; border: none; cursor: pointer; }
  button:hover { opacity: 0.9; }
</style>
</head>
<body>

<h1>Iibso Alaabta Shukri Online</h1>

<form id="buyForm">
  <label for="name">Magaca:</label>
  <input type="text" id="name" name="name" required>

  <label for="last_name">Qoyska:</label>
  <input type="text" id="last_name" name="last_name" required>

  <label for="address">Cinwaanka:</label>
  <input type="text" id="address" name="address" required>

  <label for="quantity">Tirada:</label>
  <input type="number" id="quantity" name="quantity" min="1" value="1" required>

  <label for="message">Fariinta:</label>
  <textarea id="message" name="message" rows="4"></textarea>

  <label for="product">Alaabta:</label>
  <select id="product" name="product" required>
    <option value="Baararka Shukri">Baararka Shukri - $10</option>
    <option value="Shaaha Macaan">Shaaha Macaan - $15</option>
    <option value="Biskuutka">Biskuutka - $5</option>
  </select>

  <button type="submit">Iibso WhatsApp</button>
</form>

<script>
const waNumber = "252614837293"; // Lambarkaaga WhatsApp

document.getElementById('buyForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const name = document.getElementById('name').value;
  const last_name = document.getElementById('last_name').value;
  const address = document.getElementById('address').value;
  const quantity = document.getElementById('quantity').value;
  const message = document.getElementById('message').value;
  const productSelect = document.getElementById('product');
  const productText = productSelect.options[productSelect.selectedIndex].text;

  // Qiimaha alaabta ka saar $ oo qaado number
  const price = parseFloat(productText.match(/\$(\d+)/)[1]);
  const totalPrice = price * quantity;

  // Fariinta WhatsApp
  const waMessage = `Magaca: ${name}%0AQoyska: ${last_name}%0ACinwaanka: ${address}%0AAlaabta: ${productText}%0ATirada: ${quantity}%0AQiimaha Guud: $${totalPrice}%0AFariinta: ${message}`;

  // Fur WhatsApp
  window.open(`https://wa.me/${waNumber}?text=${waMessage}`, '_blank');
});
</script>

<p>Website: <a href="https://shukionline.github.io/shukri/" target="_blank">Shukri Online</a></p>

</body>
</html>
